# Vitrine TAS — nginx : fallback SPA (react-router) + perf (gzip, cache assets).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression (perf / SEO).
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

  # Assets fingerprintés (Vite) : cache long.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Polices / images : cache moyen.
  location ~* \.(woff2?|ttf|eot|png|jpe?g|webp|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA : toutes les routes profondes (/produits, /solutions…) → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # En-têtes de sécurité de base.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
